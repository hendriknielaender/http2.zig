name: HTTP/2 Conformance Test

on: [pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
      
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build BoringSSL
        run: |
          cmake -S boringssl -B boringssl/build -DCMAKE_BUILD_TYPE=Release
          cmake --build boringssl/build --parallel

      - name: Build http2.zig
        run: zig build

      - name: Run h2spec tests
        env:
          PORT: 8081
          TLS: "true"
        run: |
          ./zig-out/bin/benchmark > /tmp/http2-benchmark.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "${server_pid}" 2>/dev/null || true
            wait "${server_pid}" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=false
          for _ in $(seq 1 10); do
            if curl --silent --show-error --fail --insecure "https://127.0.0.1:${PORT}/" >/dev/null; then
              ready=true
              break
            fi
            sleep 1
          done

          if [ "${ready}" != "true" ]; then
            cat /tmp/http2-benchmark.log
            exit 1
          fi

          if ! docker run --rm --network host summerwind/h2spec -h 127.0.0.1 -p "${PORT}" -t -k; then
            cat /tmp/http2-benchmark.log
            exit 1
          fi
