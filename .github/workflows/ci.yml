name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.16.0
  BORINGSSL_CACHE_VERSION: v2

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - run: zig fmt --check src/*.zig

  build_test_linux:
    name: Build & Unit Test (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Resolve BoringSSL revision
        id: boringssl
        run: echo "revision=$(git -C boringssl rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Restore BoringSSL library cache
        uses: actions/cache@v4
        with:
          path: |
            boringssl/build/crypto
            boringssl/build/ssl
          key: boringssl-${{ env.BORINGSSL_CACHE_VERSION }}-${{ runner.os }}-${{ env.ZIG_VERSION }}-release-${{ steps.boringssl.outputs.revision }}

      - name: Build BoringSSL library cache
        run: |
          if [[ -f boringssl/build/ssl/libssl.a && -f boringssl/build/crypto/libcrypto.a ]]; then
            echo "Using cached BoringSSL libraries."
            exit 0
          fi

          cmake -S boringssl -B boringssl/build -DCMAKE_BUILD_TYPE=Release
          cmake --build boringssl/build --target ssl crypto --parallel

      - name: Build release artifacts
        run: zig build -Doptimize=ReleaseFast -Dboringssl-lib-path=boringssl/build

      - name: Run unit tests
        run: zig build test -Dboringssl-lib-path=boringssl/build

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Generate documentation
        run: zig build docs

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: http2-docs
          path: zig-out/docs
          if-no-files-found: error
          retention-days: 14

  conformance:
    name: HTTP/2 Conformance
    needs: build_test_linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PORT: "8081"
      TLS: "true"

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Resolve BoringSSL revision
        id: boringssl
        run: echo "revision=$(git -C boringssl rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Restore BoringSSL library cache
        uses: actions/cache@v4
        with:
          path: |
            boringssl/build/crypto
            boringssl/build/ssl
          key: boringssl-${{ env.BORINGSSL_CACHE_VERSION }}-${{ runner.os }}-${{ env.ZIG_VERSION }}-release-${{ steps.boringssl.outputs.revision }}

      - name: Build BoringSSL library cache
        run: |
          if [[ -f boringssl/build/ssl/libssl.a && -f boringssl/build/crypto/libcrypto.a ]]; then
            echo "Using cached BoringSSL libraries."
            exit 0
          fi

          cmake -S boringssl -B boringssl/build -DCMAKE_BUILD_TYPE=Release
          cmake --build boringssl/build --target ssl crypto --parallel

      - name: Build benchmark server
        run: zig build -Doptimize=ReleaseFast -Dboringssl-lib-path=boringssl/build

      - name: Generate test certificate
        run: |
          openssl req -x509 -newkey rsa:4096 \
            -keyout key.pem \
            -out cert.pem \
            -days 365 \
            -nodes \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"

      - name: Run h2spec suite
        run: |
          ./zig-out/bin/benchmark > /tmp/http2-benchmark.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "${server_pid}" 2>/dev/null || true
            wait "${server_pid}" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=false
          for _ in $(seq 1 20); do
            if curl --silent --show-error --fail --insecure --http2 "https://127.0.0.1:${PORT}/" >/dev/null; then
              ready=true
              break
            fi
            sleep 1
          done

          if [ "${ready}" != "true" ]; then
            cat /tmp/http2-benchmark.log
            exit 1
          fi

          if ! docker run --rm --network host summerwind/h2spec -h 127.0.0.1 -p "${PORT}" -t -k; then
            cat /tmp/http2-benchmark.log
            exit 1
          fi

      - name: Upload conformance logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: h2spec-logs
          path: /tmp/http2-benchmark.log
          if-no-files-found: ignore
          retention-days: 7
