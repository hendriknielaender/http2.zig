name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: 0.16.0-dev.2905+5d71e3051

defaults:
  run:
    shell: bash

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Check formatting
        run: zig build fmt-check

  build_test:
    name: Build & Unit Test (${{ matrix.os }}, evented=${{ matrix.evented }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            evented: false
          - os: ubuntu-latest
            evented: true
          - os: macos-latest
            evented: false

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build BoringSSL
        run: |
          cmake -S boringssl -B boringssl/build -DCMAKE_BUILD_TYPE=Release
          cmake --build boringssl/build --parallel

      - name: Build release artifacts
        run: zig build -Doptimize=ReleaseFast -Devented=${{ matrix.evented }}

      - name: Run unit tests
        run: zig build test -Devented=${{ matrix.evented }}

  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build BoringSSL
        run: |
          cmake -S boringssl -B boringssl/build -DCMAKE_BUILD_TYPE=Release
          cmake --build boringssl/build --parallel

      - name: Generate documentation
        run: zig build docs

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: http2-docs
          path: zig-out/docs
          if-no-files-found: error
          retention-days: 14

  conformance:
    name: HTTP/2 Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PORT: "8081"
      TLS: "true"

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build BoringSSL
        run: |
          cmake -S boringssl -B boringssl/build -DCMAKE_BUILD_TYPE=Release
          cmake --build boringssl/build --parallel

      - name: Build benchmark server
        run: zig build -Doptimize=ReleaseFast

      - name: Generate test certificate
        run: |
          openssl req -x509 -newkey rsa:4096 \
            -keyout key.pem \
            -out cert.pem \
            -days 365 \
            -nodes \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"

      - name: Run h2spec suite
        run: |
          ./zig-out/bin/benchmark > /tmp/http2-benchmark.log 2>&1 &
          server_pid=$!
          cleanup() {
            kill "${server_pid}" 2>/dev/null || true
            wait "${server_pid}" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=false
          for _ in $(seq 1 20); do
            if curl --silent --show-error --fail --insecure "https://127.0.0.1:${PORT}/" >/dev/null; then
              ready=true
              break
            fi
            sleep 1
          done

          if [ "${ready}" != "true" ]; then
            cat /tmp/http2-benchmark.log
            exit 1
          fi

          if ! docker run --rm --network host summerwind/h2spec -h 127.0.0.1 -p "${PORT}" -t -k; then
            cat /tmp/http2-benchmark.log
            exit 1
          fi

      - name: Upload conformance logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: h2spec-logs
          path: /tmp/http2-benchmark.log
          if-no-files-found: ignore
          retention-days: 7
